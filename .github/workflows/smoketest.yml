name: eBPF smoke test
on: [push]
jobs:
  smoketest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install eBPF build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) gcc-multilib
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm

      - name: Grant eBPF permissions
        run: |
          sudo mount -t debugfs debugfs /sys/kernel/debug || true
          sudo mount -t tracefs tracefs /sys/kernel/tracing || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install CLI dependencies
        run: |
          cd packages/cli
          npm install

      - name: Run integration test
        env:
          NO_DOCKER: true
        run: |
          cd packages/shield-agent
          go generate ./...
          go build -o shield-agent main.go network_bpfel.go
          mkdir -p /tmp/shield-test-sockets
          sudo ./shield-agent &
          
          cd ../cli
          npx tsx src/ipc/integration.test.ts
